<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 Stats — Onixxx & 1satayy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --cream2: #ede7d9;
      --black: #111;
      --player1-bg: #1a0a2e;
      --player1-accent: #c084fc;
      --player1-mid: #7c3aed;
      --player2-bg: #071a2e;
      --player2-accent: #38bdf8;
      --player2-mid: #0ea5e9;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* ========== CANVAS FOR BLOBS ========== */
    #blob-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== HOME PAGE ========== */
    #home {
      position: fixed;
      inset: 0;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #home.hidden {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .home-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      letter-spacing: 0.12em;
      color: var(--black);
      text-align: center;
      line-height: 1;
      margin-bottom: 0.2em;
      position: relative;
      z-index: 2;
    }
    .home-sub {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4rem;
      position: relative;
      z-index: 2;
    }

    .player-cards {
      display: flex;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .player-card {
      width: 220px;
      height: 290px;
      border: 2px solid #222;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .player-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-card.p1::before { background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(192,132,252,0.08)); }
    .player-card.p2::before { background: linear-gradient(135deg, rgba(14,165,233,0.15), rgba(56,189,248,0.08)); }
    .player-card:hover::before { opacity: 1; }

    .card-num {
      position: absolute;
      top: 1.2rem; left: 1.4rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      color: rgba(0,0,0,0.07);
      user-select: none;
    }
    .card-nick {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.06em;
      color: var(--black);
      text-align: center;
      line-height: 1;
    }
    .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: #666;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }
    .card-arrow {
      position: absolute;
      bottom: 1.2rem; right: 1.4rem;
      font-size: 1.1rem;
      color: #aaa;
      transition: transform 0.3s, color 0.3s;
    }
    .player-card:hover .card-arrow {
      transform: translate(4px, -4px);
      color: #333;
    }
    .card-accent {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      transition: height 0.3s;
    }
    .p1 .card-accent { background: linear-gradient(90deg, var(--player1-mid), var(--player1-accent)); }
    .p2 .card-accent { background: linear-gradient(90deg, var(--player2-mid), var(--player2-accent)); }
    .player-card:hover .card-accent { height: 5px; }

    /* ========== PROFILE PAGE ========== */
    #profile {
      position: fixed;
      inset: 0;
      z-index: 5;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #profile.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .profile-inner {
      min-height: 100vh;
      padding: 3rem 5vw 5rem;
      position: relative;
    }

    .profile-inner.theme-p1 { background: var(--player1-bg); }
    .profile-inner.theme-p2 { background: var(--player2-bg); }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 4rem;
      transition: color 0.2s;
      position: relative;
      z-index: 2;
    }
    .back-btn:hover { color: #fff; }
    .back-arrow { font-size: 1rem; }

    /* Divider */
    .divider {
      position: relative;
      z-index: 2;
      margin: 0 2.5rem;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 3.5rem;
    }

    /* Header */
    .profile-header {
      position: relative;
      z-index: 2;
      margin-bottom: 1.5rem;
    }
    .profile-country {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
    }
    .profile-nick {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 10rem);
      letter-spacing: 0.04em;
      line-height: 0.9;
      color: #fff;
    }
    .profile-nick span { opacity: 0.18; }
    .profile-realname {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 1rem;
      color: rgba(255,255,255,0.5);
    }

    /* Stats grid */
    .stats-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      margin: 0 0 1px;
    }
    .stat-cell {
      padding: 2rem 1.8rem;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }
    .stat-cell:hover { background: rgba(255,255,255,0.07); }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.7rem;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1;
      color: #fff;
    }
    .stat-unit {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.3rem;
    }

    /* Big highlight stat */
    .stat-cell.highlight .stat-value {
      font-size: 4.5rem;
    }
    .theme-p1 .stat-cell.highlight .stat-value { color: var(--player1-accent); }
    .theme-p2 .stat-cell.highlight .stat-value { color: var(--player2-accent); }

    /* Extra info */
    .profile-extra {
      position: relative;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2.5rem;
    }
    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.45);
    }

    /* Team badge */
    .team-badge {
      position: relative;
      z-index: 2;
      margin-top: 3rem;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
    }
    .team-badge-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .theme-p1 .team-badge-dot { background: var(--player1-accent); }
    .theme-p2 .team-badge-dot { background: var(--player2-accent); }
    .team-badge-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .player-cards { flex-direction: column; align-items: center; }
      .player-card { width: 260px; height: 160px; padding-bottom: 1.5rem; }
      .divider { margin: 0 1rem; }
      .profile-inner { padding: 2rem 1.2rem 4rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Animated blob canvas (shared between pages) -->
<canvas id="blob-canvas"></canvas>

<!-- ===== HOME ===== -->
<div id="home">
  <h1 class="home-title">CS2<br/>STATS</h1>
  <p class="home-sub">Выбери игрока</p>
  <div class="player-cards">
    <div class="player-card p1" onclick="openProfile(0)">
      <span class="card-num">01</span>
      <div class="card-nick">Onixxx</div>
      <div class="card-name">Алтынбек</div>
      <div class="card-accent"></div>
      <span class="card-arrow">↗</span>
    </div>
    <div class="player-card p2" onclick="openProfile(1)">
      <span class="card-num">02</span>
      <div class="card-nick">1satayy</div>
      <div class="card-name">Ислам</div>
      <div class="card-accent"></div>
      <span class="card-arrow">↗</span>
    </div>
  </div>
</div>

<!-- ===== PROFILE ===== -->
<div id="profile">
  <div class="profile-inner" id="profile-inner">
    <button class="back-btn" onclick="goBack()">
      <span class="back-arrow">←</span> Назад
    </button>

    <div class="profile-header">
      <div class="profile-country" id="p-country"></div>
      <div class="profile-nick" id="p-nick"></div>
      <div class="profile-realname" id="p-name"></div>
    </div>

    <hr class="divider"/>

    <div class="stats-grid" id="p-stats"></div>

    <div class="profile-extra" id="p-tags"></div>
    <div class="team-badge">
      <div class="team-badge-dot"></div>
      <div class="team-badge-name" id="p-team"></div>
    </div>
  </div>
</div>

<script>
// ===================== PLAYER DATA =====================
const players = [
  {
    nick: "Onixxx",
    realname: "Алтынбек",
    country: "🇰🇿 Казахстан · Алматы",
    theme: "theme-p1",
    team: "Независимый",
    stats: [
      { label: "K/D Ratio", value: "1.34", unit: "Kills / Deaths", highlight: true },
      { label: "Попаданий в голову", value: "44%", unit: "HS Rate" },
      { label: "Побед в матчах", value: "66%", unit: "Win Rate" },
      { label: "Средний урон", value: "21 768", unit: "ADR / матч" },
      { label: "Роль", value: "Entry", unit: "Fragger" },
      { label: "Любимая карта", value: "Mirage", unit: "Map" },
    ],
    tags: ["Rifler", "Entry Fragger", "Premier Mode", "KZ Player"],
    inspiration: { nick: "m0NESY", role: "AWPer — Team Falcons", country: "🇷🇺 Россия" }
  },
  {
    nick: "1satayy",
    realname: "Ислам",
    country: "🇰🇿 Казахстан · Алматы",
    theme: "theme-p2",
    team: "Независимый",
    stats: [
      { label: "K/D Ratio", value: "1.21", unit: "Kills / Deaths", highlight: true },
      { label: "Попаданий в голову", value: "59%", unit: "HS Rate" },
      { label: "Побед в матчах", value: "58%", unit: "Win Rate" },
      { label: "Средний урон", value: "17 888", unit: "ADR / матч" },
      { label: "Роль", value: "Lurker", unit: "Support" },
      { label: "Любимая карта", value: "Inferno", unit: "Map" },
    ],
    tags: ["Rifler", "Lurker", "High HS%", "Premier Mode"],
    inspiration: { nick: "kyousuke", role: "Rifler — Team Falcons", country: "🇷🇺 Россия" }
  }
];

// ===================== BLOB ANIMATION =====================
const canvas = document.getElementById('blob-canvas');
const ctx = canvas.getContext('2d');
let W, H, blobs = [], currentTheme = 'home';

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Blob {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : (Math.random() < 0.5 ? -200 : H + 200);
    this.baseR = 120 + Math.random() * 180;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.pts = 6 + Math.floor(Math.random() * 4);
    this.angles = Array.from({length: this.pts}, (_, i) => (i / this.pts) * Math.PI * 2);
    this.offsets = this.angles.map(() => Math.random() * Math.PI * 2);
    this.speeds = this.angles.map(() => 0.005 + Math.random() * 0.008);
    this.mags = this.angles.map(() => 0.15 + Math.random() * 0.2);
    this.alpha = 0.07 + Math.random() * 0.1;
  }
  update(t) {
    this.x += this.vx; this.y += this.vy;
    if (this.x < -300 || this.x > W+300 || this.y < -300 || this.y > H+300) this.reset(false);
  }
  getColor() {
    if (currentTheme === 'home') return `rgba(0,0,0,${this.alpha})`;
    if (currentTheme === 'p1') {
      const colors = ['rgba(192,132,252,', 'rgba(124,58,237,', 'rgba(216,180,254,'];
      return colors[Math.floor(Math.random()*3)] + this.alpha + ')';
    }
    const colors = ['rgba(56,189,248,', 'rgba(14,165,233,', 'rgba(125,211,252,'];
    return colors[Math.floor(Math.random()*3)] + this.alpha + ')';
  }
  draw(t) {
    ctx.beginPath();
    const pts = this.angles.map((a, i) => {
      const r = this.baseR * (1 + this.mags[i] * Math.sin(t * this.speeds[i] + this.offsets[i]));
      return [this.x + Math.cos(a) * r, this.y + Math.sin(a) * r];
    });
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 0; i < pts.length; i++) {
      const next = pts[(i+1) % pts.length];
      ctx.quadraticCurveTo(pts[i][0], pts[i][1], (pts[i][0]+next[0])/2, (pts[i][1]+next[1])/2);
    }
    ctx.closePath();

    const col = currentTheme === 'home' ? `rgba(0,0,0,${this.alpha})` :
      currentTheme === 'p1' ? `rgba(192,132,252,${this.alpha})` : `rgba(56,189,248,${this.alpha})`;
    ctx.fillStyle = col;
    ctx.fill();
  }
}

for (let i = 0; i < 4; i++) blobs.push(new Blob());

let last = 0;
function loop(ts) {
  const t = ts * 0.001;
  ctx.clearRect(0, 0, W, H);
  blobs.forEach(b => { b.update(t); b.draw(t); });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===================== NAVIGATION =====================
function openProfile(idx) {
  const p = players[idx];
  currentTheme = idx === 0 ? 'p1' : 'p2';

  // Set theme
  const inner = document.getElementById('profile-inner');
  inner.className = 'profile-inner ' + p.theme;

  // Fill data
  document.getElementById('p-country').textContent = p.country;
  document.getElementById('p-nick').innerHTML = p.nick.split('').map((c,i) =>
    i > 3 ? `<span>${c}</span>` : c
  ).join('');
  document.getElementById('p-name').textContent = p.realname;
  document.getElementById('p-team').textContent = p.team;

  // Stats
  const grid = document.getElementById('p-stats');
  grid.innerHTML = p.stats.map(s => `
    <div class="stat-cell${s.highlight ? ' highlight' : ''}">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-unit">${s.unit}</div>
    </div>
  `).join('');

  // Inspiration
  grid.innerHTML += `
    <div class="stat-cell" style="grid-column: span 2;">
      <div class="stat-label">Вдохновение / Pro Reference</div>
      <div class="stat-value" style="font-size:2rem;">${p.inspiration.nick}</div>
      <div class="stat-unit">${p.inspiration.role} · ${p.inspiration.country}</div>
    </div>
  `;

  // Tags
  document.getElementById('p-tags').innerHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // Transition
  document.getElementById('home').classList.add('hidden');
  const prof = document.getElementById('profile');
  prof.scrollTop = 0;
  prof.classList.add('visible');
}

function goBack() {
  currentTheme = 'home';
  document.getElementById('home').classList.remove('hidden');
  document.getElementById('profile').classList.remove('visible');
}
</script>
</body>
</html>
